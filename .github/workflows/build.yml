name: Build Magpie (Cross-Platform)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:  
    types: [opened, synchronize, edited, ready_for_review]
    branches: [ main ]

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath dist-linux

      - name: Create AppImage
        run: |
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p Magpie.AppDir/usr/bin
          cp -r dist-linux/Magpie/* Magpie.AppDir/usr/bin/
          cp resources/magpie-256.png Magpie.AppDir/
          cat > Magpie.AppDir/Magpie.desktop <<EOL
          [Desktop Entry]
          Name=Magpie
          Exec=Magpie
          Icon=magpie-256.png
          Type=Application
          Categories=Utility;
          EOL
          ./appimagetool-x86_64.AppImage Magpie.AppDir
          mv Magpie-x86_64.AppImage Magpie-${{ env.VERSION }}.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magpie-Linux-AppImage
          path: Magpie-${{ env.VERSION }}.AppImage

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          $version = Get-Content version.txt
          Write-Host "VERSION=$version" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath dist-windows

        
      - name: Create Windows Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/installer.iss
          options: /O+

      - name: Upload Windows installer
        uses: actions/checkout@v4
        with:
          name: Magpie-Windows-Installer
          path: installer_output/Magpie_Setup.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath dist-macos

      - name: Create DMG
        run: |
          mkdir -p dmg
          mv dist-macos/Magpie.app dmg/
          hdiutil create -volname "Magpie" \
            -srcfolder dmg \
            -ov -format UDZO \
            Magpie-${{ env.VERSION }}-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magpie-macOS
          path: Magpie-${{ env.VERSION }}-macOS.dmg
