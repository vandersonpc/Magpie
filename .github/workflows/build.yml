name: Build Magpie (Cross-Platform)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]               # ← added: trigger on version tags (v1.0.0, v2.3.4, etc.)
  pull_request:  
    types: [opened, synchronize, edited, ready_for_review]
    branches: [ main ]

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath dist-linux

      - name: Create AppImage
        run: |
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p Magpie.AppDir/usr/bin
          cp -r dist-linux/Magpie/* Magpie.AppDir/usr/bin/
          cp resources/magpie-256.png Magpie.AppDir/
          # Inside the Create AppImage step, after copying files
          cat > Magpie.AppDir/AppRun << EOL
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/Magpie" "$@"
          EOL

            chmod +x Magpie.AppDir/AppRun


          cat > Magpie.AppDir/Magpie.desktop <<EOL
          [Desktop Entry]
          Name=Magpie
          Exec=AppRun
          Icon=magpie-256
          Type=Application
          Categories=Utility;
          EOL
          ./appimagetool-x86_64.AppImage Magpie.AppDir Magpie-${{ env.VERSION }}-x86_64.AppImage
          # ↑ fixed naming directly in appimagetool call (cleaner)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magpie-Linux-AppImage
          path: Magpie-${{ env.VERSION }}-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          $version = Get-Content version.txt
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath installer/dist-windows

      - name: Create Windows Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/installer.iss
          options: /O+

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Magpie-Windows-Installer
          path: installer/installer_output/Magpie_Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller magpie.spec --clean --distpath dist-macos

      - name: Create DMG
        run: |
          mkdir -p dmg
          mv dist-macos/Magpie.app dmg/
          hdiutil create -volname "Magpie" \
            -srcfolder dmg \
            -ov -format UDZO \
            Magpie-${{ env.VERSION }}-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magpie-macOS-DMG
          path: Magpie-${{ env.VERSION }}-macOS.dmg
          if-no-files-found: error

  # ────────────────────────────────────────────────
  #          New: Release job – runs only on tags
  # ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # only when a tag is pushed

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: Magpie-Linux-AppImage

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: Magpie-Windows-Installer

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: Magpie-macOS-DMG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Magpie ${{ github.ref_name }}
          body: |
            Automated release for Magpie ${{ github.ref_name }}
            
            **Assets:**
            - Linux: AppImage (x86_64)
            - Windows: Setup installer (.exe)
            - macOS: Disk Image (.dmg)
            
            Built from commit ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            Magpie-*.AppImage
            Magpie_Setup.exe
            Magpie-*-macOS.dmg