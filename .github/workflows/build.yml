name: Build & Release Magpie

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
    
  permissions:
    contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            name: Linux AppImage
            artifact: Magpie-Linux-AppImage
            file: Magpie-${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}-x86_64.AppImage
          - os: windows
            name: Windows Installer
            artifact: Magpie-Windows-Installer
            file: Magpie_Setup.exe
          - os: macos
            name: macOS DMG
            artifact: Magpie-macOS-DMG
            file: Magpie-${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}-macOS.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Set version tag
        id: ver
        run: |
          if [[ $GITHUB_REF_TYPE == tag ]]; then
            echo "ver=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=latest" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Change to '3.14' if your deps fully support it
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: PyInstaller build
        run: pyinstaller magpie.spec --clean --distpath dist

      # Linux: linuxdeploy + Qt plugin (recommended for PySide6)
      - name: Build AppImage with linuxdeploy
        if: matrix.os == 'ubuntu'
        run: |
          # Download latest continuous builds
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage

          chmod +x linuxdeploy*.AppImage linuxdeploy-plugin-qt*.AppImage

          # Prepare AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy PyInstaller --onedir output
          cp -r dist/Magpie/* AppDir/usr/bin/

          # Icon (linuxdeploy will handle scaling/resolutions if needed)
          cp resources/magpie-256.png AppDir/usr/share/icons/hicolor/256x256/apps/magpie.png

          # .desktop file (minimal but sufficient)
          cat > AppDir/magpie.desktop << EOF
          [Desktop Entry]
          Name=Magpie
          Exec=Magpie
          Icon=magpie
          Type=Application
          Categories=Utility;
          Terminal=false
          StartupWMClass=Magpie
          EOF

          # Build → linuxdeploy bundles Qt deps + calls appimagetool automatically
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/magpie.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/magpie.png \
            --executable AppDir/usr/bin/Magpie \
            --plugin qt \
            --output appimage

          # Rename artifact to match matrix pattern
          mv Magpie*.AppImage "${{ matrix.file }}"

      # Windows: Inno Setup
      - name: Build Installer
        if: matrix.os == 'windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/installer.iss
          options: /O+

      # macOS: Simple DMG
      - name: Build DMG
        if: matrix.os == 'macos'
        run: |
          mkdir dmg && mv dist/Magpie.app dmg/
          hdiutil create -volname Magpie -srcfolder dmg -ov -format UDZO "${{ matrix.file }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.file }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Magpie-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: Magpie ${{ github.ref_name }}
          body: |
            Cross-platform release ${{ github.ref_name }}

            • Linux AppImage (x86_64)
            • Windows Setup (.exe)
            • macOS DMG
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/**/Magpie*.AppImage
            artifacts/**/Magpie_Setup.exe
            artifacts/**/Magpie*-macOS.dmg
