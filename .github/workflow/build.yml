name: Build Magpie (Cross-Platform)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller Magpie.spec --clean --distpath dist-linux

      - name: Create AppImage
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p Magpie.AppDir/usr/bin
          cp -r dist-linux/Magpie/* Magpie.AppDir/usr/bin/
          cp resources/magpie.png Magpie.AppDir/
          cat > Magpie.AppDir/Magpie.desktop <<EOL
[Desktop Entry]
Name=Magpie
Exec=Magpie
Icon=magpie
Type=Application
Categories=Utility;
EOL
          ./appimagetool-x86_64.AppImage Magpie.AppDir
          mv Magpie-x86_64.AppImage Magpie-${{ env.VERSION }}.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v3
        with:
          name: Magpie-Linux-AppImage
          path: Magpie-${{ env.VERSION }}.AppImage

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read version
        id: get_version
        run: |
          $version = Get-Content version.txt
          Write-Host "VERSION=$version" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller Magpie.spec --clean --distpath dist-windows

      - name: Download Inno Setup
        uses: jasonetco/inno-setup-action@v1
        with:
          version: "6.2.1"

      - name: Create Windows Installer
        run: |
          $version = Get-Content version.txt
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/installer.iss /DMagpieVersion=$version

      - name: Upload Windows installer
        uses: actions/upload-artifact@v3
        with:
          name: Magpie-Windows-Installer
          path: installer_output/Magpie_Setup.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read version
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller Magpie.spec --clean --distpath dist-macos

      - name: Create DMG
        run: |
          mkdir -p dmg
          mv dist-macos/Magpie.app dmg/
          hdiutil create -volname "Magpie" \
            -srcfolder dmg \
            -ov -format UDZO \
            Magpie-${{ env.VERSION }}-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: Magpie-macOS
          path: Magpie-${{ env.VERSION }}-macOS.dmg